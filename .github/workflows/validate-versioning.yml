name: Reusable Version Bump
on:
  workflow_call:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse version bump type from PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ $PR_TITLE =~ ^\[(MAJOR|MINOR|PATCH)\] ]]; then
            echo "VERSION_TYPE=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          else
            echo "ERROR: PR title must start with [MAJOR], [MINOR], or [PATCH]"
            exit 1
          fi

      - name: Calculate new version
        run: |
          # Get current version from main
          git show origin/main:version.json > version.main.json 2>/dev/null || echo '{"major": 1, "minor": 0, "patch": 0}' > version.main.json

          OLD_MAJOR=$(jq -r '.major' version.main.json)
          OLD_MINOR=$(jq -r '.minor' version.main.json)
          OLD_PATCH=$(jq -r '.patch' version.main.json)

          case $VERSION_TYPE in
            "MAJOR")
              NEW_MAJOR=$((OLD_MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            "MINOR")
              NEW_MAJOR=$OLD_MAJOR
              NEW_MINOR=$((OLD_MINOR + 1))
              NEW_PATCH=0
              ;;
            "PATCH")
              NEW_MAJOR=$OLD_MAJOR
              NEW_MINOR=$OLD_MINOR
              NEW_PATCH=$((OLD_PATCH + 1))
              ;;
          esac

          echo "NEW_VERSION=${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}" >> $GITHUB_ENV
          echo "NEW_MAJOR=$NEW_MAJOR" >> $GITHUB_ENV
          echo "NEW_MINOR=$NEW_MINOR" >> $GITHUB_ENV
          echo "NEW_PATCH=$NEW_PATCH" >> $GITHUB_ENV

          rm version.main.json

      - name: Update version.json
        run: |
          echo "{\"major\": $NEW_MAJOR, \"minor\": $NEW_MINOR, \"patch\": $NEW_PATCH}" | jq . > version.json

      - name: Update CHANGELOG.md
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "ERROR: CHANGELOG.md file is missing"
            exit 1
          fi

          TODAY=$(date +%Y-%m-%d)

          # Replace "## Unreleased" header with the versioned header
          if grep -q "^## Unreleased" CHANGELOG.md; then
            sed -i "s/^## Unreleased/## [$NEW_VERSION] - $TODAY/" CHANGELOG.md
          else
            echo "ERROR: No '## Unreleased' section found in CHANGELOG.md"
            echo "Please add your changes under a '## Unreleased' header"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.json CHANGELOG.md

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[skip ci] bump version to $NEW_VERSION"
            git push
          fi

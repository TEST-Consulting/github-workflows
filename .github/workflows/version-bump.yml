name: Reusable Version Bump
on:
  workflow_call:
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Parse version bump type from PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ $PR_TITLE =~ ^\[(MAJOR|MINOR|PATCH)\] ]]; then
            echo "VERSION_TYPE=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          else
            echo "ERROR: PR title must start with [MAJOR], [MINOR], or [PATCH]"
            exit 1
          fi

      - name: Calculate expected version
        run: |
          git show origin/main:version.json > version.main.json 2>/dev/null || echo '{"major": 1, "minor": 0, "patch": 0}' > version.main.json

          OLD_MAJOR=$(jq -r '.major' version.main.json)
          OLD_MINOR=$(jq -r '.minor' version.main.json)
          OLD_PATCH=$(jq -r '.patch' version.main.json)

          case $VERSION_TYPE in
            "MAJOR")
              NEW_MAJOR=$((OLD_MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            "MINOR")
              NEW_MAJOR=$OLD_MAJOR
              NEW_MINOR=$((OLD_MINOR + 1))
              NEW_PATCH=0
              ;;
            "PATCH")
              NEW_MAJOR=$OLD_MAJOR
              NEW_MINOR=$OLD_MINOR
              NEW_PATCH=$((OLD_PATCH + 1))
              ;;
          esac

          echo "NEW_VERSION=${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}" >> $GITHUB_ENV
          echo "NEW_MAJOR=$NEW_MAJOR" >> $GITHUB_ENV
          echo "NEW_MINOR=$NEW_MINOR" >> $GITHUB_ENV
          echo "NEW_PATCH=$NEW_PATCH" >> $GITHUB_ENV

          rm version.main.json

      - name: Update version.json
        run: |
          CURRENT_MAJOR=$(jq -r '.major' version.json 2>/dev/null || echo "-1")
          CURRENT_MINOR=$(jq -r '.minor' version.json 2>/dev/null || echo "-1")
          CURRENT_PATCH=$(jq -r '.patch' version.json 2>/dev/null || echo "-1")

          if [[ "$CURRENT_MAJOR" == "$NEW_MAJOR" && "$CURRENT_MINOR" == "$NEW_MINOR" && "$CURRENT_PATCH" == "$NEW_PATCH" ]]; then
            echo "version.json already has $NEW_VERSION — no update needed"
          else
            echo "{\"major\": $NEW_MAJOR, \"minor\": $NEW_MINOR, \"patch\": $NEW_PATCH}" | jq . > version.json
          fi

      - name: Update CHANGELOG.md
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "ERROR: CHANGELOG.md file is missing"
            exit 1
          fi

          # Already has the versioned header — nothing to do
          if grep -q "^## \[$NEW_VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md already has ## [$NEW_VERSION] — no update needed"
          elif grep -q "^## Unreleased" CHANGELOG.md; then
            TODAY=$(date +%Y-%m-%d)
            sed -i "s/^## Unreleased/## [$NEW_VERSION] - $TODAY/" CHANGELOG.md
          else
            echo "ERROR: CHANGELOG.md has no '## Unreleased' or '## [$NEW_VERSION]' section"
            echo "Please add your changes under a '## Unreleased' header"
            exit 1
          fi

      - name: Update RELEASE_NOTES.md (if exists)
        run: |
          if [ ! -f RELEASE_NOTES.md ]; then
            exit 0
          fi

          if grep -q "^## \[$NEW_VERSION\]" RELEASE_NOTES.md; then
            echo "RELEASE_NOTES.md already has ## [$NEW_VERSION] — no update needed"
            echo "RELEASE_NOTES_UPDATED=true" >> $GITHUB_ENV
          elif grep -q "^## Unreleased" RELEASE_NOTES.md; then
            TODAY=$(date +%Y-%m-%d)
            sed -i "s/^## Unreleased/## [$NEW_VERSION] - $TODAY/" RELEASE_NOTES.md
            echo "RELEASE_NOTES_UPDATED=true" >> $GITHUB_ENV
          else
            echo "WARNING: RELEASE_NOTES.md exists but has no '## Unreleased' section — skipping"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.json CHANGELOG.md
          if [ "$RELEASE_NOTES_UPDATED" = "true" ]; then
            git add RELEASE_NOTES.md
          fi

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "Everything already up to date — nothing to commit"
          else
            git commit -m "bump version to $NEW_VERSION"
            git push
          fi
